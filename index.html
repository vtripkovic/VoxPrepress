<!doctype html>
<html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vox Prepress — Print Design & Prepress</title>
  <link rel="icon" href="assets/icon_vox.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="assets/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner container-full">
      <a class="logo" href="#home">
        <img src="assets/icon_vox.svg" alt="VoxPrepress" class="logo-icon">
        <span class="logo-text">VoxPrepress</span>
      </a>
      <nav class="main-nav" id="mainNav">
        <a data-i18n="nav.home" href="#home" data-nav></a>
        <a data-i18n="nav.blog" href="#blog" data-nav></a>
        <a data-i18n="nav.portfolio" href="#portfolio" data-nav></a>
        <a data-i18n="nav.contact" href="#contact" data-nav></a>
      </nav>
      <div class="actions">
        <div class="lang-toggle">
          <button id="lang-en" class="active">ENG</button>
          <button id="lang-sr">SRP</button>
        </div>
        <button id="menuToggle" class="hamburger" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>

  <main>
    <section id="home" class="section hero">
      <div class="container hero-inner">
        <h1 data-i18n="home.title"></h1>        
          <p data-i18n="home.lead"></p>
      </div>
    </section>

    <section id="blog" class="section hero">
        <div class="container hero-inner">
        <h1 data-i18n="blog.title"></h1>
            <div id="posts" class="posts">
                <!-- Posts injected by JS -->
            </div>
        </div>
    </section>

    <section id="portfolio" class="section hero">
      <h1 data-i18n="portfolio.title"></h1>
      <div class="grid" id="portfolioGrid">
        <!-- Portfolio items -> JS-injected placeholders -->
      </div>
    </section>

    <section id="contact" class="section contact">
      <h1 data-i18n="contact.title">Contact</h1>
      <div class="container contact-grid">
        <div class="contact-left">
          <form id="contactForm">
            <label data-i18n="contact.name">Name</label>
            <input type="text" id="name" required>
            <label data-i18n="contact.email">Email</label>
            <input type="email" id="email" required>
            <label data-i18n="contact.message">Message</label>
            <textarea id="message" rows="6" required></textarea>
            <button type="submit" class="btn" data-i18n="contact.send">Send Message</button>
          </form>
        </div>

        <div class="contact-info">
          <div class="footer-col">
            <strong data-i18n="footer.emailLabel">Email</strong>
            <p id="footerEmail">vtripkovic@gmail.com</p>
          </div>
          <div class="footer-col">
            <strong data-i18n="footer.phoneLabel">Phones</strong>
            <p id="footerPhones">+381 69 628 890, +381 60 557 7926</p>
          </div>
          <div class="footer-col map">
            <div class="map-wrap">
              <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d6737.739527246156!2d20.479303831650697!3d44.763055567099826!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2s!5e0!3m2!1sen!2srs!4v1781609816564!5m2!1sen!2srs" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="socials">
              <a href="#" id="lnkLinkedIn">LinkedIn</a>
              <a href="#" id="lnkInstagram">Instagram</a>
              <a href="#" id="lnkTwitter">Twitter</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container-full">
      <div>© <span id="year"></span> VoxPrepress</div>
      <nav class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
      </nav>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
